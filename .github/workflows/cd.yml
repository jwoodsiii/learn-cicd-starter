on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5

      - name: install goose
        run: "go install github.com/pressly/goose/v3/cmd/goose@latest"

      - name: Build app
        run: "./scripts/buildprod.sh"

      - name: gcloud auth
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: "${{ secrets.GCP_CREDENTIALS }}"

      - name: configure gcp sdk
        uses: "google-github-actions/setup-gcloud@v3"

      - name: use gcloud cli
        run: "gcloud info"

      - name: build and push
        run: "gcloud builds submit --tag us-central1-docker.pkg.dev/notely-493523/notely-ar-repo/notely:latest ."

      - name: db migrate up
        run: "./scripts/migrateup.sh"

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/notely-493523/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project notely-493523 --max-instances=4
